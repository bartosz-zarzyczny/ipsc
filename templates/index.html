<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinMSS Wyniki</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --div-open:     #c0392b;
      --div-modified: #1e8449;
      --div-standard: #1a5276;
      --div-stdman:   #6c3483;
    }
    body { background: #eef1f6; font-size: .92rem; }

    /* ── Match header ───────────────────────────────────── */
    .match-header {
      background: linear-gradient(120deg, #0d1b2a 0%, #1b3a5c 60%, #1a6b96 100%);
      color: #fff;
      padding: 18px 24px 14px;
    }
    .match-header h2 { font-size: 1.4rem; margin: 0 0 4px; }
    .match-meta       { font-size: .82rem; opacity: .75; }
    .match-meta span  { margin-right: 18px; }

    /* ── Cards ──────────────────────────────────────────── */
    .podium-card { border-top: 4px solid #dee2e6; }
    .podium-card.p1 { border-color: #d4ac0d; }
    .podium-card.p2 { border-color: #aaa; }
    .podium-card.p3 { border-color: #c0733a; }
    .podium-emoji { font-size: 2.2rem; line-height: 1; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #1a5fb4; }

    /* ── Filters ────────────────────────────────────────── */
    .filter-bar { background: #fff; border-bottom: 1px solid #d8dde6; }

    /* ── Tabs ───────────────────────────────────────────── */
    .tab-strip { background: #fff; border-bottom: 2px solid #dee2e6; }
    .tab-strip .tab-btn {
      border: none; background: none; padding: 10px 20px;
      font-weight: 500; color: #555; border-bottom: 3px solid transparent;
      margin-bottom: -2px; cursor: pointer; transition: color .15s;
    }
    .tab-strip .tab-btn:hover { color: #1a5fb4; }
    .tab-strip .tab-btn.active { color: #1a5fb4; border-bottom-color: #1a5fb4; }

    /* ── Tables ─────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; max-height: 68vh; overflow-y: auto; }
    .res-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .res-table thead th {
      position: sticky; top: 0; z-index: 2;
      background: #f3f5f9; padding: 7px 10px;
      white-space: nowrap; cursor: pointer;
      border-bottom: 2px solid #c8cdd8; user-select: none;
    }
    .res-table thead th:hover { background: #e4e8f0; }
    .res-table tbody tr:hover { background: #f0f4ff !important; }
    .res-table td { padding: 6px 10px; border-bottom: 1px solid #e8eaf0; vertical-align: middle; }

    /* row colouring */
    .tr-1   { background: #fffde7; }
    .tr-2   { background: #fafafa; }
    .tr-3   { background: #fff8f2; }
    .tr-dsq { background: #fff5f5; color: #c0392b; }
    .tr-detail { background: #f7f8fc; }

    /* hf monospace */
    .hf { font-family: 'Courier New', monospace; font-weight: 600; }

    /* pct bar */
    .pct-wrap { display: flex; align-items: center; gap: 6px; }
    .pct-bar  { flex-shrink: 0; width: 50px; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .pct-fill { height: 100%; background: #1a5fb4; border-radius: 3px; }

    /* Stage detail sub-row */
    .stage-sub { font-size: .82rem; }
    .stage-sub table { margin: 0; }
    .stage-sub td, .stage-sub th { padding: 3px 8px !important; }

    /* stage selector */
    .stage-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #dee2e6; }
    .stage-btns .sbtn {
      padding: 4px 12px; border-radius: 20px; border: 1.5px solid #4e8de8;
      background: #fff; color: #1a5fb4; cursor: pointer; font-size: .83rem; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .stage-btns .sbtn.active, .stage-btns .sbtn:hover { background: #1a5fb4; color: #fff; }

    /* pill badges */
    .badge-div, .badge-cat { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: .75rem; font-weight: 600; color: #fff; white-space: nowrap; }

    /* score zone cols */
    .miss    { color: #c0392b; font-weight: 700; }
    .proc    { color: #e67e22; font-weight: 700; }
    .alpha   { color: #1e8449; font-weight: 700; }
    .charlie { color: #b7950b; font-weight: 600; }
    .delta   { color: #c0392b; }

    /* truncated match name */
    .match-name-truncated { 
      display: inline-block;
      max-width: 65px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: help;
    }

    /* truncated competitor name */
    .competitor-name-truncated {
      display: inline-block;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: help;
    }

    /* row expand cursor */
    .expandable { cursor: pointer; }

    /* Spinner overlay */
    #section-loading { min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }

    /* Saved matches list */
    .match-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border:1px solid #dee2e6; border-radius:8px; margin-bottom:8px; transition:background .15s; cursor:pointer; }
    .match-item:hover { background:#f0f4ff; }
    .match-item .match-info { flex:1; }
    .match-item .match-info .match-title { font-weight:600; font-size:.95rem; }
    .match-item .match-info .match-meta-sm { font-size:.78rem; color:#6c757d; }
    .match-item .btn-del { opacity:.4; transition:opacity .15s; }
    .match-item .btn-del:hover { opacity:1; }

    /* Ranking view */
    .ranking-header { background: linear-gradient(120deg, #0d1b2a 0%, #1b3a5c 60%, #1a6b96 100%); color: #fff; padding: 16px 24px; }
    .ranking-header h2 { font-size: 1.3rem; margin: 0 0 6px; }
    .ranking-meta { font-size: .85rem; opacity: .8; }
    .ranking-filter { background: #fff; border-bottom: 1px solid #d8dde6; padding: 12px 16px; }
    .ranking-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .ranking-table thead th {
      position: sticky; top: 0; z-index: 2;
      background: #f3f5f9; padding: 8px 10px;
      white-space: nowrap; border-bottom: 2px solid #c8cdd8; user-select: none;
      text-align: center; font-weight: 600;
    }
    .ranking-table tbody tr:hover { background: #f0f4ff; }
    .ranking-table td { padding: 8px 10px; border-bottom: 1px solid #e8eaf0; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════ UPLOAD ══════════════════════════════════ -->
<div id="sec-upload">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="text-center mb-5">
          <div style="font-size:3.5rem">🏆</div>
          <h1 class="fw-bold mt-2 mb-1">WinMSS Wyniki</h1>
          <p class="text-muted">Przeglądarka wyników zawodów IPSC / strzeleckich</p>
        </div>

        <div id="upload-err" class="alert alert-danger mt-4 d-none small"></div>

        <!-- Tab strip -->
        <div class="tab-strip d-flex px-2 mb-0">
          <button class="tab-btn active" id="tbtn-ranking" onclick="switchMainTab('ranking')">
            <i class="bi bi-trophy"></i> Ranking
          </button>
          <button class="tab-btn" id="tbtn-matches" onclick="switchMainTab('matches')">
            <i class="bi bi-clock-history"></i> Zawody
          </button>
        </div>

        <!-- Ranking Tab -->
        <div id="tab-ranking" class="card shadow-sm rounded-bottom-0">
          <div class="card-body">
            <!-- Saved rankings -->
            <div id="saved-rankings" class="mt-2 d-none">
              <h5 class="text-center mb-3"><i class="bi bi-trophy"></i> Dostępne rankingi</h5>
              <div id="ranking-list"></div>
            </div>

            <div id="no-rankings" class="text-center text-muted mt-4 d-none">
              <p>Brak rankingów. Dodaj je w <a href="/admin">panelu admina</a>.</p>
            </div>
          </div>
        </div>

        <!-- Matches Tab -->
        <div id="tab-matches" class="d-none card shadow-sm rounded-bottom-0">
          <div class="card-body">
            <!-- Saved matches -->
            <div id="saved-matches" class="mt-2 d-none">
              <h5 class="text-center mb-3"><i class="bi bi-clock-history"></i> Wybierz zawody</h5>
              <div id="match-list"></div>
            </div>

            <div id="no-matches" class="text-center text-muted mt-4 d-none">
              <p>Brak zawodów. Dodaj je w <a href="/admin">panelu admina</a>.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════ LOADING ═════════════════════════════════ -->
<div id="sec-loading" class="d-none">
  <div class="spinner-border text-primary" style="width:3.5rem;height:3.5rem"></div>
  <p class="text-muted mt-3 fs-5">Przetwarzanie pliku…</p>
</div>

<!-- ══════════════════════════════════ RESULTS ═════════════════════════════════ -->
<div id="sec-results" class="d-none">

  <!-- Match header -->
  <div class="match-header d-flex align-items-start justify-content-between flex-wrap gap-3">
    <div>
      <h2 id="r-name"></h2>
      <div class="match-meta">
        <span><i class="bi bi-calendar3"></i> <span id="r-date"></span></span>
        <span><i class="bi bi-trophy"></i> Poziom&nbsp;L<span id="r-level"></span></span>
        <span><i class="bi bi-list-ol"></i> <span id="r-stages"></span>&nbsp;torów</span>
        <span><i class="bi bi-people"></i> <span id="r-comps"></span>&nbsp;zawodników</span>
      </div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-light" onclick="downloadCSV()"><i class="bi bi-download"></i> CSV</button>
      <button class="btn btn-sm btn-outline-light" onclick="resetUI()"><i class="bi bi-arrow-left"></i> Wróć</button>
    </div>
  </div>

  <!-- Podium + stats cards -->
  <div class="container-fluid px-3 py-3">
    <div class="row g-3 mb-3" id="podium-row"></div>

    <!-- Filter bar -->
    <div class="card shadow-sm mb-0 rounded-bottom-0">
      <div class="filter-bar px-3 py-2">
        <div class="row g-2 align-items-center">
          
          <div class="col-md-3">
            <select class="form-select form-select-sm" id="f-div" onchange="applyFilters()">
              <option value="">Wszystkie dywizje</option>
            </select>
          </div>
          <div class="col-md-3">
            <select class="form-select form-select-sm" id="f-cat" onchange="applyFilters()">
              <option value="">Wszystkie kategorie</option>
            </select>
          </div>
          <div class="col-md-2 text-muted small text-end" id="f-count"></div>
        </div>
      </div>

      <!-- Tab strip -->
      <div class="tab-strip d-flex px-2">
        <button class="tab-btn active" id="tbtn-overall"    onclick="switchTab('overall')">   <i class="bi bi-list-ol"></i>    Zestawienie ogólne</button>
        <button class="tab-btn"        id="tbtn-divisions"  onclick="switchTab('divisions')"> <i class="bi bi-grid-3x3-gap"></i> Dywizje</button>
        <button class="tab-btn"        id="tbtn-stages"     onclick="switchTab('stages')">    <i class="bi bi-bar-chart-steps"></i> Tory</button>
      </div>

      <!-- ── Overall ─────────────────────────────────────────── -->
      <div id="tab-overall">
        <div class="tbl-wrap">
          <table class="res-table">
            <thead><tr id="overall-head"></tr></thead>
            <tbody id="overall-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── Divisions ──────────────────────────────────────── -->
      <div id="tab-divisions" class="d-none p-3">
        <div id="div-content"></div>
      </div>

      <!-- ── Stages ─────────────────────────────────────────── -->
      <div id="tab-stages" class="d-none">
        <div class="stage-btns" id="stage-btns"></div>
        <div class="tbl-wrap">
          <table class="res-table">
            <thead><tr id="stage-head"></tr></thead>
            <tbody id="stage-body"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /card -->
  </div><!-- /container -->
</div><!-- /sec-results -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════════════ */
const G = {
  data:     null,
  sort:     { col: 'rank', dir: 'asc' },
  tab:      'overall',
  stageIdx: 0,
  mainTab:  'ranking',
};

/* ═══════════════════════════════════════════════════════════════════════════
   UPLOAD / SECTION VISIBILITY
═══════════════════════════════════════════════════════════════════════════ */
const $upload  = document.getElementById('sec-upload');
const $loading = document.getElementById('sec-loading');
const $results = document.getElementById('sec-results');

function show(which) {
  [$upload, $loading, $results].forEach(el => el.classList.add('d-none'));
  which.classList.remove('d-none');
}

function uploadErr(msg) {
  const el = document.getElementById('upload-err');
  el.textContent = 'Błąd: ' + msg;
  el.classList.remove('d-none');
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN TAB SWITCHING (Ranking / Zawody)
═══════════════════════════════════════════════════════════════════════════ */
function switchMainTab(tabName) {
  G.mainTab = tabName;
  G.data = null;
  G.rankingInfo = null;
  G.rankingMatches = [];
  G.stageIdx = 0;
  G.sort = { col: 'rank', dir: 'asc' };
  
  // Resetuj filtry
  const fDiv = document.getElementById('f-div');
  const fCat = document.getElementById('f-cat');
  if (fDiv) fDiv.value = '';
  if (fCat) fCat.value = '';
  
  // Hide all tabs
  document.getElementById('tab-ranking').classList.add('d-none');
  document.getElementById('tab-matches').classList.add('d-none');
  
  // Show selected tab
  document.getElementById('tab-' + tabName).classList.remove('d-none');
  
  // Update button states
  document.getElementById('tbtn-ranking').classList.toggle('active', tabName === 'ranking');
  document.getElementById('tbtn-matches').classList.toggle('active', tabName === 'matches');
  
  // Załaduj listę zawodów/rankingów
  if (tabName === 'matches') {
    loadMatchList();
  } else if (tabName === 'ranking') {
    loadRankingList();
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SAVED MATCHES
═══════════════════════════════════════════════════════════════════════════ */
function loadMatchList() {
  fetch('/api/matches')
    .then(r => r.json())
    .then(matches => {
      const container = document.getElementById('saved-matches');
      const noMatches = document.getElementById('no-matches');
      const list = document.getElementById('match-list');
      if (!matches.length) {
        container.classList.add('d-none');
        noMatches.classList.remove('d-none');
        return;
      }
      noMatches.classList.add('d-none');
      container.classList.remove('d-none');
      list.innerHTML = matches.map(m => `
        <div class="match-item" onclick="loadMatch(${m.id})">
          <div class="match-info">
            <div class="match-title">${esc(m.name)}</div>
            <div class="match-meta-sm">
              <i class="bi bi-calendar3"></i> ${esc(m.date || '–')}
              &nbsp;·&nbsp;Poziom L${m.level}
              &nbsp;·&nbsp;<i class="bi bi-clock"></i> ${esc(m.created_at)}
            </div>
          </div>
        </div>
      `).join('');
    });
}

function loadMatch(id) {
  show($loading);
  fetch('/api/matches/' + id)
    .then(r => r.json())
    .then(d => { if (d.error) throw new Error(d.error); initResults(d); })
    .catch(e => { show($upload); uploadErr(e.message); });
}

// Load match list on page load
loadMatchList();
loadRankingList();

function loadRankingList() {
  fetch('/api/rankings')
    .then(r => r.json())
    .then(rankings => {
      const container = document.getElementById('saved-rankings');
      const noRankings = document.getElementById('no-rankings');
      const list = document.getElementById('ranking-list');
      if (!rankings.length) {
        container.classList.add('d-none');
        noRankings.classList.remove('d-none');
        return;
      }
      noRankings.classList.add('d-none');
      container.classList.remove('d-none');
      list.innerHTML = rankings.map(r => `
        <div class="match-item" onclick="loadRanking(${r.id})">
          <div class="match-info">
            <div class="match-title">${esc(r.name)}</div>
            <div class="match-meta-sm">
              <i class="bi bi-list-ol"></i> ${r.match_count} ${r.match_count === 1 ? 'zawód' : 'zawodów'}
              &nbsp;·&nbsp;<i class="bi bi-clock"></i> ${esc(r.created_at)}
            </div>
          </div>
        </div>
      `).join('');
    });
}

function loadRanking(id) {
  show($loading);
  fetch('/api/rankings/' + id)
    .then(r => r.json())
    .then(d => { if (d.error) throw new Error(d.error); initRankingResults(d); })
    .catch(e => { show($upload); uploadErr(e.message); });
}

function resetUI() {
  G.data = null;
  G.rankingInfo = null;
  document.getElementById('upload-err').classList.add('d-none');
  // clear dynamic division/cat filter options
  ['f-div','f-cat'].forEach(id => {
    const sel = document.getElementById(id);
    sel.value = '';  // Reset selected value
    while (sel.options.length > 1) sel.remove(1);
  });
  // Show tab buttons again
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('d-none'));
  // Switch back to the appropriate tab based on current mainTab
  switchMainTab(G.mainTab || 'matches');
  show($upload);
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT RESULTS
═══════════════════════════════════════════════════════════════════════════ */
function initResults(data) {
  G.data    = data;
  G.rankingInfo = null;  // Reset ranking info when loading a new match
  G.sort    = { col: 'rank', dir: 'asc' };
  G.stageIdx = 0;

  // Header
  document.getElementById('r-name').textContent   = data.match.name;
  document.getElementById('r-date').textContent   = data.match.date;
  document.getElementById('r-level').textContent  = data.match.level;
  document.getElementById('r-stages').textContent = data.stages.length;
  document.getElementById('r-comps').textContent  = data.competitors.length;
  document.title = data.match.name + ' — WinMSS';

  // Podium
  renderPodium(data);

  // Division filter
  const fdiv = document.getElementById('f-div');
  [...new Set(data.competitors.map(c => c.division))].sort().forEach(div => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = div;
    fdiv.appendChild(opt);
  });

  // Category filter
  const fcat = document.getElementById('f-cat');
  const cats = [...new Set(data.competitors.map(c => c.category).filter(Boolean))].sort();
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = cat;
    fcat.appendChild(opt);
  });

  // Set filter onchange handlers to use applyFilters (not renderRankingTable)
  fdiv.onchange = () => applyFilters();
  fcat.onchange = () => applyFilters();

  // Stage buttons
  const sb = document.getElementById('stage-btns');
  sb.innerHTML = data.stages.map((s, i) =>
    `<button class="sbtn${i === 0 ? ' active' : ''}" onclick="selectStage(${i},this)">${esc(s.name)}<small class="ms-1 opacity-60">/${s.max_points}</small></button>`
  ).join('');

  G.tab = 'overall';
  highlightTab('overall');
  applyFilters();
  show($results);
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT RANKING RESULTS
═══════════════════════════════════════════════════════════════════════════ */
function initRankingResults(rankingData) {
  // Merge results from all matches in the ranking
  if (!rankingData.matches || rankingData.matches.length === 0) {
    uploadErr('Ranking nie zawiera żadnych zawodów');
    show($upload);
    return;
  }

  const topMatchesCount = rankingData.top_matches_count || 0; // 0 = wszystkie
  
  // Store matches metadata for column headers (with multiplier)
  G.rankingMatches = rankingData.matches.map(m => ({
    id: m.match.id,
    name: m.match.name,
    multiplier: m.match.multiplier || 1.0,
    competitors: m.competitors,
  }));

  // Build competitor data with per-match results
  // Use name+division as unique key (comp_id changes across matches)
  const compMap = {}; // "Name|Division" -> { name, division, ..., matchResults: [...] }
  
  rankingData.matches.forEach((matchData, matchIdx) => {
    const matchMultiplier = matchData.match.multiplier || 1.0;
    
    matchData.competitors.forEach(comp => {
      const compKey = `${comp.name}|${comp.division}`;
      if (!compMap[compKey]) {
        compMap[compKey] = {
          comp_id: comp.comp_id,
          name: comp.name,
          division: comp.division,
          category: comp.category,
          female: comp.female,
          is_disq: comp.is_disq,
          matchResults: [],
        };
      }
      const c = compMap[compKey];
      
      // Get max points_in_division for this competitor's division in this match
      const divStages = matchData.competitors.filter(mc => mc.division === comp.division && !mc.is_disq);
      let maxPointsInDiv = 0;
      divStages.forEach(mc => {
        if (mc.total_points_in_division && mc.total_points_in_division > maxPointsInDiv) {
          maxPointsInDiv = mc.total_points_in_division;
        }
      });
      
      const pctInDiv = maxPointsInDiv > 0 && !comp.is_disq ? (comp.total_points_in_division / maxPointsInDiv * 100) : 0;
      const multipliedPct = pctInDiv * matchMultiplier;
      
      c.matchResults.push({
        matchId: matchData.match.id,
        pct_in_div: comp.is_disq ? 0 : pctInDiv,
        multiplied_pct: comp.is_disq ? 0 : multipliedPct, // With multiplier applied
        points: comp.total_points || 0,
        is_disq: comp.is_disq,
      });
    });
  });

  const merged = Object.values(compMap);
  
  // Calculate best matches sum (using multiplied scores)
  merged.forEach(c => {
    const validResults = c.matchResults.filter(r => !r.is_disq);
    const topResults = validResults
      .sort((a, b) => b.multiplied_pct - a.multiplied_pct) // Sort by multiplied value
      .slice(0, topMatchesCount > 0 ? topMatchesCount : validResults.length);
    
    c.total_pct = topResults.reduce((sum, r) => sum + r.multiplied_pct, 0); // Sum multiplied values
  });

  // Rank non-disqualified competitors
  const active = merged.filter(c => !c.is_disq).sort((a,b) => b.total_pct - a.total_pct);
  active.forEach((c, i) => {
    c.rank = i + 1;
  });

  // Store in G.data for ranking view
  G.data = merged;
  G.rankingInfo = {
    name: rankingData.name,
    date: rankingData.updated_at?.substring(0, 10) || '–',
    topMatchesCount: topMatchesCount,
    matchCount: rankingData.match_count,
  };

  // Set up title
  const topMatchesLabel = topMatchesCount > 0 
    ? ` (${topMatchesCount} najlepszych)`
    : ' (wszystkie)';
  document.title = rankingData.name + ' — WinMSS';

  // Set header for ranking
  document.getElementById('r-name').textContent = rankingData.name;
  document.getElementById('r-date').textContent = rankingData.updated_at?.substring(0, 10) || '–';
  document.getElementById('r-level').textContent = rankingData.match_count;
  document.getElementById('r-stages').textContent = rankingData.match_count;
  document.getElementById('r-comps').textContent = merged.filter(c => !c.is_disq).length;

  // Hide podium for rankings
  document.getElementById('podium-row').innerHTML = '';

  // Populate division filter with default to Open
  const fdiv = document.getElementById('f-div');
  fdiv.innerHTML = '<option value="">— wszystkie dywizje —</option>';
  [...new Set(merged.map(c => c.division))].sort().forEach(div => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = div;
    if (div === 'Open') opt.selected = true;
    fdiv.appendChild(opt);
  });
  fdiv.onchange = () => renderRankingTable();

  // Populate category filter with available categories
  const fcat = document.getElementById('f-cat');
  fcat.innerHTML = '<option value="">— wszystkie kategorie —</option>';
  const categories = [...new Set(merged.map(c => c.category).filter(Boolean))].sort();
  categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = cat;
    fcat.appendChild(opt);
  });
  fcat.onchange = () => renderRankingTable();
  document.getElementById('stage-btns').innerHTML = '';

  // Hide tab bar for ranking
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.add('d-none'));

  // Render ranking table
  renderRankingTable();
  show($results);
}

function renderRankingTable() {
  // Defensywna kontrola - G.data powinno być tablicą dla rankingu
  if (!Array.isArray(G.data)) {
    console.error('renderRankingTable: G.data is not an array', G.data);
    return;
  }
  
  // Get selected division and category
  const selectedDiv = document.getElementById('f-div').value;
  const selectedCat = document.getElementById('f-cat').value;
  
  // Filter by division and category
  let filtered = G.data;
  if (selectedDiv) {
    filtered = filtered.filter(c => c.division === selectedDiv);
  }
  if (selectedCat) {
    filtered = filtered.filter(c => c.category === selectedCat);
  }
  
  // Sort by rank (already sorted, but filter may change order)
  filtered = filtered.filter(c => !c.is_disq).sort((a,b) => a.rank - b.rank);

  // Update count
  document.getElementById('f-count').textContent = `${filtered.length} zawodników`;

  // Build header with match names
  let headerHTML = '<th style="width: 30px; text-align: center; padding: 7px 2px !important">#</th>';
  headerHTML += '<th style="width: 200px">Zawodnik</th>';
  
  const topMatchesCount = G.rankingInfo.topMatchesCount;
  const totalMatches = G.rankingMatches.length;
  const topLabel = topMatchesCount > 0 ? ` (najlepsze ${topMatchesCount} z ${totalMatches})` : ' (wszystkie)';
  headerHTML += `<th style="text-align: center; font-weight: bold; width: 180px">Razem${topLabel}</th>`;
  
  G.rankingMatches.forEach(m => {
    headerHTML += `<th style="text-align: center; width: 75px; font-size: 0.85rem" title="${esc(m.name)}">
      <span class="match-name-truncated">${esc(m.name)}</span>
    </th>`;
  });
  
  document.getElementById('overall-head').innerHTML = headerHTML;

  // Build body rows
  let bodyHTML = filtered.map((c, index) => {
    const rowClass = index === 0 ? 'tr-1' : index === 1 ? 'tr-2' : index === 2 ? 'tr-3' : '';
    let row = `<tr class="${rowClass}">
      <td class="fw-bold" style="width: 30px; text-align: center; padding: 6px 2px">${index + 1}</td>
      <td title="${esc(c.name)}">
        <div><span class="competitor-name-truncated">${esc(c.name)}</span>${c.female ? ' <i class="bi bi-gender-female text-danger"></i>' : ''}</div>
        <div class="small text-muted">${divBadge(c.division)}</div>
      </td>`;
    
    // Add per-match percentages
    G.rankingMatches.forEach(m => {
      const result = c.matchResults.find(r => r.matchId === m.id);
      const pct = result ? result.multiplied_pct.toFixed(1) : '–';
      const pctNum = result?.multiplied_pct || 0;
      
      const bgColor = pctNum > 0 ? Math.min(100, pctNum) : 0;
      const opacity = bgColor / 100;
      
      row += `<td style="text-align: center; background: rgba(26, 95, 180, ${opacity * 0.2})">
        <strong>${pct}%</strong>
      </td>`;
    });
    
    // Add total
    const totalPct = c.total_pct.toFixed(1);
    row += `<td style="text-align: center; background: rgba(26, 95, 180, 0.15); font-weight: bold">
      ${totalPct}%
    </td>`;
    
    row += '</tr>';
    return row;
  }).join('');

  document.getElementById('overall-body').innerHTML = bodyHTML || '<tr><td colspan="100" class="text-center text-muted py-4">Brak wyników dla wybranych filtrów</td></tr>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   FILTERS & SORT
═══════════════════════════════════════════════════════════════════════════ */
function getFiltered() {
  const searchEl = document.getElementById('f-search');
  const s   = searchEl ? searchEl.value.toLowerCase() : '';
  const div = document.getElementById('f-div').value;
  const cat = document.getElementById('f-cat').value;
  return G.data.competitors.filter(c =>
    (!s   || c.name.toLowerCase().includes(s)) &&
    (!div || c.division === div) &&
    (!cat || c.category === cat)
  );
}

function applyFilters() {
  if (!G.data) return;
  
  // Określ typ danych na podstawie struktury G.data
  const isRanking = Array.isArray(G.data);
  const isMatch = G.data.competitors && typeof G.data === 'object';
  
  if (isRanking && G.rankingInfo) {
    // To ranking - render ranking table
    renderRankingTable();
    return;
  }
  
  if (isMatch) {
    // To zwykły match - render normal view
    const filtered = getFiltered();
    document.getElementById('f-count').textContent =
      filtered.length === G.data.competitors.length
        ? `${filtered.length} zawodników`
        : `${filtered.length} / ${G.data.competitors.length}`;

    const divFilter = document.getElementById('f-div').value;
    if (divFilter && G.sort.col === 'rank') { G.sort.col = 'div_rank'; G.sort.dir = 'asc'; }
    if (!divFilter && G.sort.col === 'div_rank') { G.sort.col = 'rank'; G.sort.dir = 'asc'; }

    if (G.tab === 'overall')   renderOverall(filtered);
    if (G.tab === 'divisions') renderDivisions(filtered);
    if (G.tab === 'stages')    renderStage(G.stageIdx, filtered);
  }
}

function doSort(col) {
  if (G.sort.col === col) {
    G.sort.dir = G.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    G.sort.col = col;
    G.sort.dir = (col === 'rank' || col === 'comp_id') ? 'asc' : 'desc';
  }
  applyFilters();
}

function sorted(list, divRankMap) {
  const { col, dir } = G.sort;
  const sign = dir === 'asc' ? 1 : -1;
  return [...list].sort((a, b) => {
    if (a.is_disq && !b.is_disq) return 1;
    if (!a.is_disq && b.is_disq) return -1;
    let va, vb;
    if (col === 'div_rank' && divRankMap) {
      va = a.is_disq ? 99999 : (divRankMap[a.comp_id] ?? 99999);
      vb = b.is_disq ? 99999 : (divRankMap[b.comp_id] ?? 99999);
    } else {
      va = a[col]; vb = b[col];
      if (col === 'name') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (col === 'rank') {
        va = a.is_disq ? 99999 : (typeof va === 'number' ? va : 99999);
        vb = b.is_disq ? 99999 : (typeof vb === 'number' ? vb : 99999);
      }
    }
    return va < vb ? -sign : va > vb ? sign : 0;
  });
}

function sortArrow(col) {
  if (G.sort.col !== col)     return '<i class="bi bi-arrow-down-up text-muted opacity-25 ms-1 small"></i>';
  return G.sort.dir === 'asc' ? '<i class="bi bi-arrow-up text-primary ms-1 small"></i>'
                               : '<i class="bi bi-arrow-down text-primary ms-1 small"></i>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   OVERALL TABLE
═══════════════════════════════════════════════════════════════════════════ */
const COLS = [
  { key:'rank',         label:'#',           title:'Miejsce ogólne' },
  { key:'comp_id',      label:'Nr',          title:'Numer startowy' },
  { key:'name',         label:'Zawodnik',    title:'Nazwisko i imię' },
  { key:'division',     label:'Dywizja',     title:'Dywizja' },
  { key:'category',     label:'Kat.',        title:'Kategoria' },
  { key:'total_points', label:'Pkt',         title:'Punkty łącznie' },
  { key:'total_time',   label:'Czas',        title:'Łączny czas [s]' },
  { key:'overall_hf',   label:'HF Overall',  title:'Hit Factor Overall' },
  { key:'pct',          label:'% lidera',    title:'Procent do lidera' },
];

function renderOverall(list) {
  // Czy aktywny jest filtr dywizji?
  const divFilter = document.getElementById('f-div').value;

  // Gdy filtr dywizji aktywny → punkty per-division; bez filtra → globalne
  const ptsField = divFilter ? 'total_points_in_division' : 'total_points_overall';
  const getPoints = c => c[ptsField] ?? c.total_points;

  // Miejsce w dywizji — buduj PRZED sorted() żeby można sortować wg div_rank
  const divRankMap = {};
  if (divFilter) {
    const activeSorted = [...list.filter(c => !c.is_disq)].sort((a,b) => getPoints(b) - getPoints(a));
    activeSorted.forEach((c, i) => { divRankMap[c.comp_id] = i + 1; });
  }

  let data = sorted(list, divRankMap);

  // Przefiltruj dane na dywizję jeśli jest aktywny filtr
  if (divFilter) {
    data = data.filter(c => c.division === divFilter);
  }

  // Najlepsze punkty w aktualnie filtrowanej liście (do obliczenia % lidera)
  const bestPts = data.filter(c => !c.is_disq).reduce((mx, c) => Math.max(mx, getPoints(c)), 0);

  // Head
  const colsHtml = COLS.map(c =>
    `<th onclick="doSort('${c.key}')" title="${c.title}">${c.label}${sortArrow(c.key)}</th>`
  );
  document.getElementById('overall-head').innerHTML = colsHtml.join('') + '<th title="Rozwiń szczegóły torów"><i class="bi bi-chevron-down"></i></th>';

  // Body
  document.getElementById('overall-body').innerHTML = data.map((c, index) => {
    const cPts = getPoints(c);
    const rc  = c.is_disq ? 'tr-dsq' : index === 0 ? 'tr-1' : index === 1 ? 'tr-2' : index === 2 ? 'tr-3' : '';
    const rnk = c.is_disq ? '<span class="badge bg-danger">DSQ</span>' : rankEmoji(index + 1);
    const localPct = bestPts > 0 ? cPts / bestPts * 100 : 0;
    const pct = c.is_disq ? '-' : `<div class="pct-wrap"><div class="pct-bar"><div class="pct-fill" style="width:${localPct}%"></div></div><span>${localPct.toFixed(1)}%</span></div>`;
    const hf  = c.is_disq ? '-' : `<span class="hf">${c.overall_hf.toFixed(4)}</span>`;
    const fem = c.female   ? ' <i class="bi bi-gender-female text-danger" title="Kobieta"></i>' : '';

    return `<tr class="${rc} expandable" data-uid="${c.comp_id}" onclick="toggleDetail(this,${c.comp_id})">
      <td>${rnk}</td>
      <td class="text-muted">${c.comp_id}</td>
      <td>${esc(c.name)}${fem}</td>
      <td>${divBadge(c.division)}</td>
      <td>${catBadge(c.category)}</td>
      <td>${c.is_disq ? '-' : cPts.toFixed(4)}</td>
      <td>${c.is_disq ? '-' : c.total_time.toFixed(2)+'s'}</td>
      <td>${hf}</td>
      <td>${pct}</td>
      <td class="text-muted text-center"><i class="bi bi-chevron-down small"></i></td>
    </tr>`;
  }).join('');
}

/* Stage-detail sub-row (click to expand) */
function toggleDetail(row, compId) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('tr-detail')) { next.remove(); return; }

  const c = G.data.competitors.find(x => x.comp_id === compId);
  if (!c) return;

  const stageRows = G.data.stages.map((s, i) => {
    const sc = c.stage_scores[i];
    if (!sc)       return `<tr><td>${esc(s.name)}</td><td colspan="11" class="text-muted">–</td></tr>`;
    if (sc.disq)   return `<tr class="table-danger"><td>${esc(s.name)}</td><td colspan="11">DSQ</td></tr>`;
    const stgBest = getStageMaxHF(i, c.division);
    const stgPct  = stgBest > 0 ? (sc.hf / stgBest * 100).toFixed(1) : '–';
    return `<tr>
      <td>${esc(s.name)}</td>
      <td class="alpha">${sc.A}</td><td class="charlie">${sc.B}</td>
      <td class="charlie">${sc.C}</td><td class="delta">${sc.D}</td>
      <td class="${sc.M  > 0 ? 'miss':''}">${sc.M}</td>
      <td class="${sc.PE > 0 ? 'proc':''}">${sc.PE}</td>
      <td>${sc.pts.toFixed(4)}</td><td>${sc.time.toFixed(2)}s</td>
      <td class="hf">${sc.hf.toFixed(4)}</td>
      <td>${stgPct}%</td>
    </tr>`;
  }).join('');

  const detail = document.createElement('tr');
  detail.className = 'tr-detail stage-sub';
  const divFilter = document.getElementById('f-div').value;
  const totalCols = COLS.length + (divFilter ? 1 : 0) + 1;
  detail.innerHTML = `<td colspan="${totalCols}">
    <div style="padding:8px 12px">
      <table class="table table-sm table-bordered mb-0" style="font-size:.8rem">
        <thead class="table-light"><tr>
          <th>Tor</th><th>A</th><th>B</th><th>C</th><th>D</th>
          <th>M</th><th>PE</th><th>Pkt</th><th>Czas</th><th>HF</th><th>% w dyw.</th>
        </tr></thead>
        <tbody>${stageRows}</tbody>
      </table>
    </div>
  </td>`;
  row.insertAdjacentElement('afterend', detail);
}

/* ═══════════════════════════════════════════════════════════════════════════
   DIVISIONS TAB
═══════════════════════════════════════════════════════════════════════════ */
function renderDivisions(list) {
  const byDiv = {};
  list.forEach(c => { (byDiv[c.division] = byDiv[c.division]||[]).push(c); });

  let html = '';
  for (const div of Object.keys(byDiv).sort()) {
    const comps  = byDiv[div];
    const active = comps.filter(c => !c.is_disq).sort((a,b) => (b.total_points_in_division || b.total_points) - (a.total_points_in_division || a.total_points));
    const disq   = comps.filter(c => c.is_disq);
    const bestPts = active[0]?.total_points_in_division || active[0]?.total_points || 0;

    html += `<div class="mb-4">
      <div class="d-flex align-items-center gap-2 px-1 py-2 border-bottom">
        ${divBadge(div, 'lg')}
        <span class="fw-semibold">${esc(div)}</span>
        <span class="badge bg-secondary">${comps.length}</span>
      </div>
      <div class="table-responsive">
      <table class="res-table">
        <thead><tr>
          <th>#&nbsp;Dyw.</th><th>#&nbsp;Og.</th><th>Zawodnik</th><th>Kat.</th>
          <th>Pkt</th><th>Czas</th><th>HF</th><th>%&nbsp;lidera</th><th>%&nbsp;w&nbsp;dyw.</th>
        </tr></thead>
        <tbody>`;

    active.forEach((c, i) => {
      const divPct = bestPts > 0 ? ((c.total_points_in_division || c.total_points) / bestPts * 100).toFixed(2) : '–';
      const rc = i===0?'tr-1':i===1?'tr-2':i===2?'tr-3':'';
      html += `<tr class="${rc}">
        <td>${rankEmoji(i+1)}</td>
        <td class="text-muted">${c.rank}</td>
        <td>${esc(c.name)}${c.female?' <i class="bi bi-gender-female text-danger"></i>':''}</td>
        <td>${catBadge(c.category)}</td>
        <td>${(c.total_points_in_division || c.total_points).toFixed(4)}</td>
        <td>${c.total_time.toFixed(2)}s</td>
        <td><span class="hf">${c.overall_hf.toFixed(4)}</span></td>
        <td><div class="pct-wrap"><div class="pct-bar"><div class="pct-fill" style="width:${c.pct}%"></div></div>${c.pct.toFixed(1)}%</div></td>
        <td><div class="pct-wrap"><div class="pct-bar"><div class="pct-fill" style="width:${divPct}%"></div></div>${divPct}%</div></td>
      </tr>`;
    });
    disq.forEach(c => {
      html += `<tr class="tr-dsq"><td><span class="badge bg-danger">DSQ</span></td>
        <td>DSQ</td><td>${esc(c.name)}</td><td>${catBadge(c.category)}</td>
        <td colspan="5" class="text-danger fst-italic">Dyskwalifikowany</td></tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  document.getElementById('div-content').innerHTML = html || '<p class="text-muted p-3">Brak wyników dla wybranych filtrów.</p>';
}

/* ═══════════════════════════════════════════════════════════════════════════
   STAGES TAB
═══════════════════════════════════════════════════════════════════════════ */
function selectStage(idx, btn) {
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStage(idx, getFiltered());
}

function renderStage(idx, filtered) {
  G.stageIdx = idx;
  if (!G.data) return;
  const stage  = G.data.stages[idx];
  const list   = filtered || getFiltered();

  const pairs = list
    .map(c => ({ c, sc: c.stage_scores[idx] }))
    .filter(x => x.sc !== null && x.sc !== undefined);

  const active = pairs.filter(x => !x.sc.disq).sort((a,b) => b.sc.hf - a.sc.hf);
  const disq   = pairs.filter(x => x.sc.disq);

  document.getElementById('stage-head').innerHTML = `
    <th>#&nbsp;Tor</th><th>#&nbsp;Og.</th><th>Zawodnik</th><th>Dywizja</th><th>Kat.</th>
    <th title="Alpha/Popper">A</th><th title="Beta">B</th><th title="Charlie">C</th><th title="Delta">D</th>
    <th title="Chybień">M</th><th title="No-Shoot">NS</th><th title="Procedural Errors">PE</th>
    <th>Pkt</th><th>Czas</th><th>HF</th><th>%&nbsp;w&nbsp;dyw.</th>`;

  let rows = active.map((x, i) => {
    const { c, sc } = x;
    const divBestHF = getStageMaxHF(idx, c.division);
    const pct = divBestHF > 0 ? (sc.hf / divBestHF * 100).toFixed(2) : '–';
    const rc  = i===0?'tr-1':i===1?'tr-2':i===2?'tr-3':'';
    return `<tr class="${rc}">
      <td>${rankEmoji(i+1)}</td>
      <td class="text-muted">${typeof c.rank === 'number' ? c.rank : 'DSQ'}</td>
      <td>${esc(c.name)}${c.female?' <i class="bi bi-gender-female text-danger"></i>':''}</td>
      <td>${divBadge(c.division)}</td>
      <td>${catBadge(c.category)}</td>
      <td class="${sc.A>0?'alpha':''}">${sc.A}</td>
      <td class="${sc.B>0?'charlie':''}">${sc.B}</td>
      <td class="${sc.C>0?'charlie':''}">${sc.C}</td>
      <td class="${sc.D>0?'delta':''}">${sc.D}</td>
      <td class="${sc.M>0?'miss':''}"> ${sc.M}</td>
      <td class="${sc.NS>0?'miss':''}"> ${sc.NS}</td>
      <td class="${sc.PE>0?'proc':''}"> ${sc.PE}</td>
      <td>${sc.pts.toFixed(4)}</td>
      <td>${sc.time.toFixed(2)}s</td>
      <td><span class="hf">${sc.hf.toFixed(4)}</span></td>
      <td><div class="pct-wrap"><div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>${pct}%</div></td>
    </tr>`;
  }).join('');

  rows += disq.map(x => {
    const { c } = x;
    return `<tr class="tr-dsq">
      <td><span class="badge bg-danger">DSQ</span></td>
      <td>${typeof c.rank === 'number' ? c.rank : 'DSQ'}</td>
      <td>${esc(c.name)}</td>
      <td>${divBadge(c.division)}</td><td>${catBadge(c.category)}</td>
      <td colspan="11" class="text-danger fst-italic">Dyskwalifikowany</td>
    </tr>`;
  }).join('');

  document.getElementById('stage-body').innerHTML = rows;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  G.tab = tab;
  highlightTab(tab);
  const ids = ['overall','divisions','stages'];
  ids.forEach(id => {
    const el = document.getElementById('tab-' + id);
    el.classList.toggle('d-none', id !== tab);
  });
  applyFilters();
}

function highlightTab(tab) {
  ['overall','divisions','stages'].forEach(id => {
    document.getElementById('tbtn-' + id).classList.toggle('active', id === tab);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   CSV EXPORT (client-side)
═══════════════════════════════════════════════════════════════════════════ */
function downloadCSV() {
  if (!G.data) return;
  const { stages, competitors } = G.data;
  const sn = stages.map(s => s.name);

  const head = [
    'Miejsce','Nr','Zawodnik','Dywizja','Kategoria','Płeć','Eskwadra',
    ...sn.flatMap(n => [`${n} Pkt`,`${n} Czas`,`${n} HF`]),
    'Pkt łącznie','Czas łącznie','HF Overall','% lidera'
  ];

  const rows = competitors.map(c => [
    c.is_disq ? 'DSQ' : c.rank,
    c.comp_id, c.name, c.division, c.category,
    c.female ? 'K' : 'M', c.squad,
    ...c.stage_scores.flatMap(sc =>
      sc == null        ? ['','','']
      : sc.disq         ? ['DSQ','','DSQ']
      : [sc.pts.toFixed(4), sc.time.toFixed(2), sc.hf.toFixed(4)]
    ),
    c.is_disq ? 'DSQ' : c.total_points.toFixed(4),
    c.is_disq ? '' : c.total_time.toFixed(2),
    c.is_disq ? 'DSQ' : c.overall_hf.toFixed(4),
    c.is_disq ? 'DSQ' : c.pct.toFixed(2) + '%',
  ]);

  const csv = [head, ...rows]
    .map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(','))
    .join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (G.data.match.name.replace(/[^\w\s-]/g,'').trim() || 'wyniki') + '.csv';
  a.click();
}

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
function getStageMaxHF(stageIdx, division) {
  const mhf = G.data.stages[stageIdx].max_hf_by_div;
  return (mhf && mhf[division]) || 0;
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const DIV_BG = {
  'Open':            '#c0392b',
  'Standard':        '#1a5276',
  'Standard Manual': '#6c3483',
  'Modified':        '#1e8449',
};
function divBadge(div, size) {
  const bg = DIV_BG[div] || '#555';
  const fs = size === 'lg' ? 'font-size:.85rem;padding:4px 12px' : 'font-size:.74rem';
  return `<span class="badge-div" style="background:${bg};${fs}">${esc(div)}</span>`;
}

const CAT_BG = {
  'Lady':        '#b03a8c',
  'Senior':      '#c87b20',
  'Super Senior':'#6c757d',
  'Junior':      '#0a7a8e',
  'Super Junior':'#20a070',
};
function catBadge(cat) {
  const bg = CAT_BG[cat];
  if (!bg) return '';
  return `<span class="badge-cat" style="background:${bg}">${esc(cat)}</span>`;
}

function rankEmoji(r) {
  if (r === 1) return '🥇&nbsp;<strong>1</strong>';
  if (r === 2) return '🥈&nbsp;<strong>2</strong>';
  if (r === 3) return '🥉&nbsp;<strong>3</strong>';
  return r;
}
