<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logowanie – Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { max-width: 380px; width: 100%; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem">🔒</div>
          <h4 class="fw-bold mt-2">Panel administracyjny</h4>
          <p class="text-muted small">WinMSS Wyniki</p>
        </div>
        {% if error %}
        <div class="alert alert-danger small py-2">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Login</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Hasło</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Zaloguj się</button>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="/" class="text-muted small">← Powrót do wyników</a>
    </div>
  </div>
</body>
</html>
