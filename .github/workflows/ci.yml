name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # ręczne uruchomienie z zakładki Actions (tylko write access)

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: testy kontraktowe + walidacja schematów
  # ---------------------------------------------------------------------------
  test:
    name: Tests & Schema Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          python3 -m pytest tests/ \
            --tb=short \
            -q \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Validate JSON Schemas (Draft 2020-12)
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          import jsonschema

          schemas_dir = pathlib.Path("spec/schemas")
          errors = []
          for path in sorted(schemas_dir.glob("*.json")):
              try:
                  schema = json.loads(path.read_text())
                  jsonschema.Draft202012Validator.check_schema(schema)
                  print(f"  OK  {path.name}")
              except Exception as e:
                  errors.append(f"  FAIL {path.name}: {e}")
                  print(errors[-1])
          if errors:
              sys.exit(1)
          print(f"\n{len(list(schemas_dir.glob('*.json')))} schemas valid.")
          EOF

      - name: Validate OpenAPI spec (parse check)
        run: |
          python3 - <<'EOF'
          import yaml, sys, pathlib

          spec_path = pathlib.Path("spec/openapi.yaml")
          try:
              spec = yaml.safe_load(spec_path.read_text())
          except Exception as e:
              print(f"FAIL: cannot parse {spec_path}: {e}")
              sys.exit(1)

          paths   = len(spec.get("paths", {}))
          schemas = len(spec.get("components", {}).get("schemas", {}))
          version = spec.get("openapi", "?")
          print(f"OK: OpenAPI {version}, {paths} paths, {schemas} component schemas")
          EOF

  # ---------------------------------------------------------------------------
  # Job 2: Docker build — weryfikuje że obraz buduje się poprawnie
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ipsc-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: schemathesis fuzz-testing (opcjonalny, nie blokuje CI)
  # ---------------------------------------------------------------------------
  schemathesis:
    name: Schemathesis (fuzz)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true # nie blokuje merge gdy znajdzie edge-case

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Start Flask test server
        run: |
          export FLASK_APP=app.py
          export SECRET_KEY=ci-test-secret-key
          python3 -m flask run --port 5001 &
          # Poczekaj na start serwera (max 15s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:5001/api/matches && break
            sleep 1
          done

      - name: Run schemathesis — public endpoints only
        run: |
          python3 -m schemathesis run spec/openapi.yaml \
            --base-url http://localhost:5001 \
            --tag public \
            --checks status_code_conformance response_schema_conformance \
            --max-examples 20 \
            --report schemathesis-report.txt || true
          cat schemathesis-report.txt 2>/dev/null || true

      - name: Upload schemathesis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schemathesis-report
          path: schemathesis-report.txt
